name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Enforce gofmt
        run: |
          fmt_changes=$(gofmt -l .)
          if [ -n "$fmt_changes" ]; then
            echo "The following files need gofmt:\n$fmt_changes"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Go build
        run: |
          mkdir -p build
          go build -o build/minisnap ./cmd/server

      - name: Docker build (validation only)
        run: docker build -t minisnap:ci .

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minisnap:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minisnap:${{ github.sha }}

      - name: Show image digest
        run: |
          echo "Published digest: ${{ steps.build-and-push.outputs.digest }}"
